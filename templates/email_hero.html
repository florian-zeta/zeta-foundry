<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ subject_line }}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:{{ brand.font_family }};">

<!-- Preview text (hidden) -->
<span style="display:none;max-height:0;overflow:hidden;">{{ preview_text }}</span>

<!-- Wrapper -->
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;padding:20px 0;">
  <tr>
    <td align="center">

      <!-- Email container -->
      <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;overflow:hidden;max-width:600px;width:100%;">

        <!-- Header / Logo bar -->
        <tr>
          <td style="background-color:{{ brand.primary_color }};padding:24px 32px;text-align:left;">
            {% if brand.logo_url %}
              <img src="{{ brand.logo_url }}" alt="{{ brand.logo_text }}" height="36" style="display:block;">
            {% else %}
              <span style="color:#ffffff;font-size:20px;font-weight:bold;letter-spacing:0.5px;">{{ brand.logo_text }}</span>
            {% endif %}
          </td>
        </tr>

        <!-- Hero block -->
        <tr>
          <td style="background-color:{{ brand.primary_color }};padding:40px 32px 48px;">
            <h1 style="margin:0;color:#ffffff;font-size:28px;line-height:1.3;font-weight:700;">
              {{ headline }}
            </h1>
          </td>
        </tr>

        <!-- Accent bar -->
        <tr>
          <td style="background-color:{{ brand.accent_color }};height:4px;font-size:0;line-height:0;">&nbsp;</td>
        </tr>

        <!-- Body copy -->
        <tr>
          <td style="padding:36px 32px 24px;">
            <p style="margin:0 0 24px;color:#333333;font-size:16px;line-height:1.7;">
              {{ body_copy }}
            </p>

            <!-- CTA button -->
            <table cellpadding="0" cellspacing="0">
              <tr>
                <td style="background-color:{{ brand.accent_color }};border-radius:6px;">
                  <a href="{{ cta_url }}"
                     style="display:inline-block;padding:14px 28px;color:#ffffff;font-size:16px;font-weight:600;text-decoration:none;letter-spacing:0.3px;">
                    {{ cta_text }} &rarr;
                  </a>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Divider -->
        <tr>
          <td style="padding:0 32px;">
            <hr style="border:none;border-top:1px solid #eeeeee;margin:0;">
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:24px 32px;text-align:center;">
            <p style="margin:0;color:#999999;font-size:12px;line-height:1.6;">
              You're receiving this because you opted in to communications from {{ brand.logo_text }}.<br>
              <a href="#" style="color:#999999;">Unsubscribe</a> &nbsp;&middot;&nbsp;
              <a href="#" style="color:#999999;">View in browser</a>
            </p>
          </td>
        </tr>

      </table>
      <!-- /Email container -->

    </td>
  </tr>
</table>

</body>
</html>
